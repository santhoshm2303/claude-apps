<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --bg2:       #f5f4f0;
    --bg3:       #eeecea;
    --text:      #1a1a18;
    --text2:     #5f5e5a;
    --text3:     #9b9990;
    --border:    rgba(0,0,0,0.10);
    --border2:   rgba(0,0,0,0.18);
    --radius:    8px;
    --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #1c1c1a;
      --bg2:       #252523;
      --bg3:       #2e2e2b;
      --text:      #f0ede8;
      --text2:     #a8a69f;
      --text3:     #6b6963;
      --border:    rgba(255,255,255,0.10);
      --border2:   rgba(255,255,255,0.18);
    }
  }

  body { font-family: var(--font); background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ── Layout ── */
  .app { max-width: 1200px; margin: 0 auto; padding: 24px 16px 48px; }

  header { margin-bottom: 20px; }
  header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  header p  { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border2); margin-bottom: 20px; }
  .tab  { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer;
          border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: #1D9E75; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Stat cards ── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat  { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius);
           padding: 10px 14px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .btn  { font-size: 12px; padding: 5px 11px; border: 0.5px solid var(--border2);
          border-radius: 6px; background: var(--bg); color: var(--text2);
          cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover  { background: var(--bg2); color: var(--text); }
  .btn.active { background: var(--bg2); color: var(--text); border-color: var(--border2); outline: 1.5px solid #1D9E75; outline-offset: 1px; }
  .sep  { width: 1px; height: 20px; background: var(--border); }
  .hint { font-size: 11px; color: var(--text3); margin-left: auto; }

  /* ── Gantt outer ── */
  .gantt-outer { overflow-x: auto; border: 0.5px solid var(--border2); border-radius: 10px; position: relative; background: var(--bg); }
  table { border-collapse: collapse; width: 100%; min-width: 700px; }
  thead tr { border-bottom: 1px solid var(--border2); }
  .th-lbl { width: 220px; min-width: 220px; padding: 7px 12px; font-size: 11px; font-weight: 600;

  .th-mo  { padding: 7px 2px; font-size: 10px; font-weight: 500; color: var(--text2); text-align: center;
            background: var(--bg2); border-left: 0.5px solid var(--border); }
