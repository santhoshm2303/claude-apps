=<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Open Pit Mine — Approval Pathway Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ore: #C8873A;
  --ore-light: #E8A55A;
  --earth: #2A1F14;
  --earth-mid: #3D2E1E;
  --earth-light: #5A4535;
  --dust: #B8A898;
  --dust-light: #D4C8B8;
  --sky: #7BA8C4;
  --approved: #4CAF7D;
  --pending: #E8B84B;
  --not-started: #6B7280;
  --rejected: #E05A5A;
  --bg: #1A1208;
  --surface: #221A0E;
  --surface2: #2E2210;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--dust-light);
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

header {
  background: var(--earth);
  border-bottom: 2px solid var(--ore);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.12em;
  color: var(--ore);
  line-height: 1;
}

.logo span {
  color: var(--dust);
  font-size: 0.75rem;
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.2em;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.header-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--dust);
  background: var(--earth-mid);
  padding: 4px 10px;
  border: 1px solid var(--earth-light);
  letter-spacing: 0.1em;
}

.btn-add {
  background: var(--ore);
  color: var(--earth);
  border: none;
  padding: 8px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-add:hover { background: var(--ore-light); }

main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--earth-light);
  border: 1px solid var(--earth-light);
  margin-bottom: 2rem;
  animation: fadeUp 0.5s ease both;
}

.stat {
  background: var(--surface);
  padding: 1.2rem 1.5rem;
  text-align: center;
}

.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  line-height: 1;
  color: var(--ore);
}

.stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--dust);
  margin-top: 4px;
  text-transform: uppercase;
}

/* Filter row */
.filter-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  animation: fadeUp 0.5s 0.1s ease both;
}

.filter-btn {
  background: var(--surface);
  border: 1px solid var(--earth-light);
  color: var(--dust);
  padding: 6px 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--ore);
  color: var(--earth);
  border-color: var(--ore);
}

/* Project grid */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 1.5rem;
  animation: fadeUp 0.5s 0.2s ease both;
}

.project-card {
  background: var(--surface);
  border: 1px solid var(--earth-light);
  border-top: 3px solid var(--ore);
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.project-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 60px; height: 60px;
  background: linear-gradient(135deg, transparent 50%, rgba(200,135,58,0.05) 50%);
}

.project-card:hover {
  transform: translateY(-2px);
  border-color: var(--ore);
}

.card-header {
  padding: 1.2rem 1.5rem 1rem;
  border-bottom: 1px solid var(--earth-mid);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}

.project-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.08em;
  color: var(--dust-light);
  line-height: 1.2;
}

.project-region {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--dust);
  margin-top: 3px;
  letter-spacing: 0.1em;
}

.status-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  padding: 3px 8px;
  letter-spacing: 0.1em;
  white-space: nowrap;
  flex-shrink: 0;
}

.status-approved { background: rgba(76,175,125,0.15); color: var(--approved); border: 1px solid rgba(76,175,125,0.3); }
.status-pending { background: rgba(232,184,75,0.15); color: var(--pending); border: 1px solid rgba(232,184,75,0.3); }
.status-not-started { background: rgba(107,114,128,0.15); color: var(--not-started); border: 1px solid rgba(107,114,128,0.3); }
.status-rejected { background: rgba(224,90,90,0.15); color: var(--rejected); border: 1px solid rgba(224,90,90,0.3); }

/* Progress bar */
.card-progress { padding: 1rem 1.5rem; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--dust);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.progress-track {
  height: 4px;
  background: var(--earth-mid);
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--ore), var(--ore-light));
  transition: width 0.6s ease;
}

/* Approval stages */
.stages { padding: 0 1.5rem 1.5rem; }

.stage-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.stage-row:last-child { border-bottom: none; }

.stage-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-approved { background: var(--approved); }
.dot-pending { background: var(--pending); box-shadow: 0 0 6px rgba(232,184,75,0.5); }
.dot-not-started { background: var(--earth-light); }
.dot-rejected { background: var(--rejected); }

.stage-name {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.75rem;
  color: var(--dust);
  flex: 1;
}

.stage-date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--earth-light);
  letter-spacing: 0.05em;
}

/* Card footer */
.card-footer {
  padding: 0.75rem 1.5rem;
  background: var(--earth);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--earth-light);
  letter-spacing: 0.08em;
}

.card-actions { display: flex; gap: 0.5rem; }

.btn-icon {
  background: transparent;
  border: 1px solid var(--earth-light);
  color: var(--dust);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.75rem;
  transition: all 0.2s;
}
.btn-icon:hover { border-color: var(--ore); color: var(--ore); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--earth-light);
  grid-column: 1 / -1;
}
.empty-state svg { opacity: 0.3; margin-bottom: 1rem; }
.empty-state p { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--ore);
  width: 100%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-header {
  background: var(--earth);
  padding: 1.2rem 1.5rem;
  border-bottom: 1px solid var(--ore);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  color: var(--ore);
}

.modal-close {
  background: transparent;
  border: 1px solid var(--earth-light);
  color: var(--dust);
  width: 30px; height: 30px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
}
.modal-close:hover { border-color: var(--ore); color: var(--ore); }

.modal-body { padding: 1.5rem; }

.form-group { margin-bottom: 1.2rem; }

.form-label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--dust);
  margin-bottom: 6px;
  text-transform: uppercase;
}

.form-input, .form-select {
  width: 100%;
  background: var(--earth);
  border: 1px solid var(--earth-light);
  color: var(--dust-light);
  padding: 8px 12px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--ore); }
.form-select option { background: var(--earth); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.stages-editor { margin-top: 0.5rem; }

.stage-edit-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  align-items: center;
}

.modal-footer {
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--earth-light);
  display: flex;
  justify-content: flex-end;
  gap: 0.75rem;
}

.btn-cancel {
  background: transparent;
  border: 1px solid var(--earth-light);
  color: var(--dust);
  padding: 8px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--dust); }

.btn-save {
  background: var(--ore);
  border: none;
  color: var(--earth);
  padding: 8px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-save:hover { background: var(--ore-light); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .projects-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  header { padding: 0 1rem; }
  main { padding: 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    Mine Tracker
    <span>WA OPEN PIT APPROVAL PATHWAY</span>
  </div>
  <div class="header-right">
    <div class="header-badge" id="lastUpdated">UPDATED —</div>
    <button class="btn-add" onclick="openModal()">+ ADD PROJECT</button>
  </div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total Projects</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statApproved" style="color:var(--approved)">0</div>
      <div class="stat-label">Fully Approved</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statInProgress" style="color:var(--pending)">0</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statStages">0</div>
      <div class="stat-label">Stages Cleared</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">IN PROGRESS</button>
    <button class="filter-btn" onclick="setFilter('approved', this)">APPROVED</button>
    <button class="filter-btn" onclick="setFilter('not-started', this)">NOT STARTED</button>
    <button class="filter-btn" onclick="setFilter('rejected', this)">REJECTED</button>
  </div>

  <div class="projects-grid" id="projectsGrid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">NEW PROJECT</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Project Name</label>
          <input class="form-input" id="fName" placeholder="e.g. Pilbara Iron Extension">
        </div>
        <div class="form-group">
          <label class="form-label">Region</label>
          <input class="form-input" id="fRegion" placeholder="e.g. Pilbara, WA">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Operator</label>
          <input class="form-input" id="fOperator" placeholder="Company name">
        </div>
        <div class="form-group">
          <label class="form-label">Commodity</label>
          <input class="form-input" id="fCommodity" placeholder="e.g. Iron Ore, Gold">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Overall Status</label>
        <select class="form-select" id="fStatus">
          <option value="not-started">Not Started</option>
          <option value="pending">In Progress</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Approval Stages</label>
        <div class="stages-editor" id="stagesEditor"></div>
        <button class="btn-cancel" style="margin-top:0.5rem;font-size:0.65rem" onclick="addStageField()">+ ADD STAGE</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" onclick="saveProject()">SAVE PROJECT</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_STAGES = [
  'Native Title Clearance',
  'Environmental Impact Assessment',
  'Mining Proposal (DMIRS)',
  'Works Approval (EPA)',
  'Water Licence (DoW)',
  'Heritage Survey',
  'Mine Closure Plan',
  'State Agreement / MOU'
];

let projects = JSON.parse(localStorage.getItem('wa-mine-tracker') || '[]');
let editingId = null;
let currentFilter = 'all';

if (projects.length === 0) {
  projects = [
    {
      id: 1,
      name: 'Pilbara Iron Ore Extension',
      region: 'Pilbara, WA',
      operator: 'Fortescue Ltd',
      commodity: 'Iron Ore',
      status: 'pending',
      created: '2025-08-01',
      stages: [
        { name: 'Native Title Clearance', status: 'approved', date: '2025-09-14' },
        { name: 'Environmental Impact Assessment', status: 'approved', date: '2025-11-02' },
        { name: 'Mining Proposal (DMIRS)', status: 'pending', date: '' },
        { name: 'Works Approval (EPA)', status: 'not-started', date: '' },
        { name: 'Water Licence (DoW)', status: 'not-started', date: '' },
        { name: 'Heritage Survey', status: 'approved', date: '2025-10-08' },
        { name: 'Mine Closure Plan', status: 'not-started', date: '' },
      ]
    },
    {
      id: 2,
      name: 'Goldfields Deep Pit Stage 2',
      region: 'Kalgoorlie, WA',
      operator: 'Northern Star Resources',
      commodity: 'Gold',
      status: 'approved',
      created: '2024-03-15',
      stages: [
        { name: 'Native Title Clearance', status: 'approved', date: '2024-04-20' },
        { name: 'Environmental Impact Assessment', status: 'approved', date: '2024-07-11' },
        { name: 'Mining Proposal (DMIRS)', status: 'approved', date: '2024-09-03' },
        { name: 'Works Approval (EPA)', status: 'approved', date: '2024-10-28' },
        { name: 'Water Licence (DoW)', status: 'approved', date: '2024-12-15' },
        { name: 'Heritage Survey', status: 'approved', date: '2024-05-30' },
        { name: 'Mine Closure Plan', status: 'approved', date: '2025-01-20' },
      ]
    },
    {
      id: 3,
      name: 'Kimberley Bauxite Project',
      region: 'Kimberley, WA',
      operator: 'Rio Tinto WA',
      commodity: 'Bauxite',
      status: 'not-started',
      created: '2026-02-10',
      stages: [
        { name: 'Native Title Clearance', status: 'not-started', date: '' },
        { name: 'Environmental Impact Assessment', status: 'not-started', date: '' },
        { name: 'Mining Proposal (DMIRS)', status: 'not-started', date: '' },
        { name: 'Works Approval (EPA)', status: 'not-started', date: '' },
        { name: 'Water Licence (DoW)', status: 'not-started', date: '' },
      ]
    }
  ];
  save();
}

function save() {
  localStorage.setItem('wa-mine-tracker', JSON.stringify(projects));
  render();
}

function getStatusLabel(s) {
  return { approved: 'APPROVED', pending: 'IN PROGRESS', 'not-started': 'NOT STARTED', rejected: 'REJECTED' }[s] || s;
}

function calcProgress(stages) {
  if (!stages.length) return 0;
  const done = stages.filter(s => s.status === 'approved').length;
  return Math.round((done / stages.length) * 100);
}

function render() {
  const grid = document.getElementById('projectsGrid');
  const filtered = currentFilter === 'all' ? projects : projects.filter(p => p.status === currentFilter);

  // Stats
  document.getElementById('statTotal').textContent = projects.length;
  document.getElementById('statApproved').textContent = projects.filter(p => p.status === 'approved').length;
  document.getElementById('statInProgress').textContent = projects.filter(p => p.status === 'pending').length;
  const totalStages = projects.reduce((a, p) => a + p.stages.filter(s => s.status === 'approved').length, 0);
  document.getElementById('statStages').textContent = totalStages;
  document.getElementById('lastUpdated').textContent = 'UPDATED ' + new Date().toLocaleDateString('en-AU', {day:'2-digit',month:'short',year:'numeric'}).toUpperCase();

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><p>NO PROJECTS FOUND</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const prog = calcProgress(p.stages);
    const stagesHtml = p.stages.map(s => `
      <div class="stage-row">
        <div class="stage-dot dot-${s.status}"></div>
        <div class="stage-name">${s.name}</div>
        <div class="stage-date">${s.date || '—'}</div>
      </div>`).join('');

    return `
    <div class="project-card" onclick="editProject(${p.id})">
      <div class="card-header">
        <div>
          <div class="project-name">${p.name}</div>
          <div class="project-region">${p.region} · ${p.commodity}</div>
        </div>
        <div class="status-badge status-${p.status}">${getStatusLabel(p.status)}</div>
      </div>
      <div class="card-progress">
        <div class="progress-label">
          <span>APPROVAL PROGRESS</span>
          <span>${prog}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${prog}%"></div>
        </div>
      </div>
      <div class="stages">${stagesHtml}</div>
      <div class="card-footer">
        <div class="card-meta">${p.operator} · ${p.created}</div>
        <div class="card-actions">
          <button class="btn-icon" onclick="event.stopPropagation();editProject(${p.id})" title="Edit">✎</button>
          <button class="btn-icon" onclick="event.stopPropagation();deleteProject(${p.id})" title="Delete" style="color:var(--rejected)">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal(project) {
  editingId = project ? project.id : null;
  document.getElementById('modalTitle').textContent = project ? 'EDIT PROJECT' : 'NEW PROJECT';
  document.getElementById('fName').value = project?.name || '';
  document.getElementById('fRegion').value = project?.region || '';
  document.getElementById('fOperator').value = project?.operator || '';
  document.getElementById('fCommodity').value = project?.commodity || '';
  document.getElementById('fStatus').value = project?.status || 'not-started';

  const editor = document.getElementById('stagesEditor');
  editor.innerHTML = '';
  const stages = project?.stages || DEFAULT_STAGES.map(n => ({ name: n, status: 'not-started', date: '' }));
  stages.forEach((s, i) => addStageField(s));

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function addStageField(stage) {
  const editor = document.getElementById('stagesEditor');
  const row = document.createElement('div');
  row.className = 'stage-edit-row';
  row.innerHTML = `
    <input class="form-input stage-name-input" placeholder="Stage name" value="${stage?.name || ''}" style="font-size:0.78rem">
    <select class="form-select stage-status-input" style="font-size:0.72rem;padding:8px 6px">
      <option value="not-started" ${stage?.status==='not-started'?'selected':''}>Not Started</option>
      <option value="pending" ${stage?.status==='pending'?'selected':''}>Pending</option>
      <option value="approved" ${stage?.status==='approved'?'selected':''}>Approved</option>
      <option value="rejected" ${stage?.status==='rejected'?'selected':''}>Rejected</option>
    </select>
    <button class="btn-icon" onclick="this.parentElement.remove()" style="flex-shrink:0;color:var(--rejected)">✕</button>
  `;
  editor.appendChild(row);
}

function saveProject() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('Project name required'); return; }

  const stages = [...document.querySelectorAll('.stage-edit-row')].map(row => ({
    name: row.querySelector('.stage-name-input').value.trim(),
    status: row.querySelector('.stage-status-input').value,
    date: ''
  })).filter(s => s.name);

  const data = {
    name,
    region: document.getElementById('fRegion').value.trim(),
    operator: document.getElementById('fOperator').value.trim(),
    commodity: document.getElementById('fCommodity').value.trim(),
    status: document.getElementById('fStatus').value,
    stages
  };

  if (editingId) {
    const idx = projects.findIndex(p => p.id === editingId);
    projects[idx] = { ...projects[idx], ...data };
  } else {
    projects.push({ id: Date.now(), created: new Date().toISOString().split('T')[0], ...data });
  }

  save();
  closeModal();
}

function editProject(id) {
  const p = projects.find(p => p.id === id);
  if (p) openModal(p);
}

function deleteProject(id) {
  if (confirm('Delete this project?')) {
    projects = projects.filter(p => p.id !== id);
    save();
  }
}

render();
</script>
</body>
</html>
